name: JAIL LUXURY UAT Deployment

on:
  push:
    branches:
      - uat

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Set Timestamp Variable
        id: vars
        run: echo "TIMESTAMP=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: docker build -t sapnadipbaidya/jail_luxury_react_ui:${{ env.TIMESTAMP }} -t sapnadipbaidya/jail_luxury_react_ui:latest .

      - name: Publish Image to Docker Hub
        run: |
          docker push sapnadipbaidya/jail_luxury_react_ui:${{ env.TIMESTAMP }}
          docker push sapnadipbaidya/jail_luxury_react_ui:latest

  deploy:
    needs: build
    runs-on: jail_luxury_react_runner
    steps:
      - name: Pull Image from Docker Hub
        run: docker pull sapnadipbaidya/jail_luxury_react_ui:latest

      - name: Delete Old Container (If Exists)
        run: docker rm -f reactContainer || true

      - name: Run Docker Container
        run: |
          docker run -d -p 3000:80 --name reactContainer \
          --restart unless-stopped \
          sapnadipbaidya/jail_luxury_react_ui:latest