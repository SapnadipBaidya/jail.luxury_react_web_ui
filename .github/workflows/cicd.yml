name: JAIL LUXURY UAT Deployment

on:
  push:
    branches:
    - uat

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout Source
       uses: actions/checkout@v1
     - name: Login to Docker Hub 
       run:  docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
     - name: Build Docker Image
       run:  docker build -t  sapnadipbaidya/jail_luxury_react_ui .
     - name: Publish Image to docker hub
       run:  docker push sapnadipbaidya/jail_luxury_react_ui:latest      
  
  deploy:
    needs: build
    runs-on: aws-ec2
    steps:
      - name: Pull image from docker hub
        run: docker pull sapnadipbaidya/jail_luxury_react_ui:latest
      - name: Delete Old Container
        run:  docker rm -f reactContainer  
      - name: Run Docker container
        run:  docker rm -d 3000:80 --name reactContainer sapnadipbaidya/jail_luxury_react_ui
