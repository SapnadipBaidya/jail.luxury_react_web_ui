<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/jailLogo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jail Luxury</title>

  <style>
    /* Ensure body does not interfere with main layout */
    body {
      margin: 0;
      background-color: black;
    }

    /* Loading screen styles */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .loader {
      --size: 50rem;
      --duration: 2s;
      height: var(--size);
      aspect-ratio: 1;
      position: relative;
    }

    .loader .box {
      position: absolute;
      background: rgba(66, 61, 33, 0.2);
      border-radius: 50%;
      border-top: 1px solid rgb(14, 8, 8);
      animation: ripple var(--duration) infinite ease-in-out;
    }

    .loader .box:nth-child(1) {
      inset: 170%;
      animation-delay: 0s;
    }

    .loader .box:nth-child(2) {
      inset: 30%;
      animation-delay: 0.2s;
    }

    .loader .box:nth-child(3) {
      inset: 20%;
      animation-delay: 0.4s;
    }

    .loader .box:nth-child(4) {
      inset: 10%;
      animation-delay: 0.6s;
    }

    .loader .box:nth-child(5) {
      inset: 0%;
      animation-delay: 0.8s;
    }

    /* Logo Styling */
    .logo {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .custom-logo {
      width: 20rem; /* Adjust size as needed */
      height: auto;
      object-fit: contain;
      animation: fade-in var(--duration) infinite ease-in-out;
    }

    @keyframes fade-in {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes ripple {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* Hide the loader after transition */
    .hidden {
      opacity: 0 !important;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="logo">
        <img src="./jailLogo.webp" alt="Jail Luxury" class="custom-logo" />
      </div>
    </div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

  <!-- React App Script -->
  <script type="module" src="./src/index.jsx"></script>

  <!-- JavaScript to Remove Loading Screen -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      setTimeout(() => {
        const loader = document.getElementById("loading-screen");
        loader.classList.add("hidden"); // Fade out
        setTimeout(() => loader.remove(), 500); // Remove from DOM
      }, 2000);
    });
  </script>
</body>

</html>
